name: Daily News Enhanced

on:
  schedule:
    # 北京时间每天上午10点运行 (UTC+8)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  daily-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --save axios cheerio fast-xml-parser nodemailer
          npm install -g nodemailer

      - name: Run enhanced intelligence aggregator
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: node enhanced-intelligence-aggregator.js

      - name: Keep alive on failure
        if: failure()
        run: |
          echo "Job failed, but workflow completed"
          exit 0
